name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [debug, asan, tsan, ubsan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  macos:
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        preset: [debug, asan, ubsan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ninja

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
