# ddr4.cfg — v++ link config binding each m_axi bundle to a distinct DDR4 bank
#
# Without explicit `sp=` (slave port) assignments, v++ is free to place every
# m_axi bundle on whichever DDR bank it likes — usually bank 0 for all of
# them, which caps this kernel at one bank's ~19.25 GB/s no matter how the
# HLS side is written. These assignments are what actually make the
# 4-bank DATAFLOW structure in ddr4_bandwidth.cpp matter.
#
# TODO: link on F1 with `v++ --link --config ddr4.cfg ...`. Untested.

[connectivity]
sp=ddr4_bandwidth_1.in0:DDR[0]
sp=ddr4_bandwidth_1.out0:DDR[0]
sp=ddr4_bandwidth_1.in1:DDR[1]
sp=ddr4_bandwidth_1.out1:DDR[1]
sp=ddr4_bandwidth_1.in2:DDR[2]
sp=ddr4_bandwidth_1.out2:DDR[2]
sp=ddr4_bandwidth_1.in3:DDR[3]
sp=ddr4_bandwidth_1.out3:DDR[3]
