syntax = "proto3";
package runtime;

// Control-plane RPC for the cross-machine runtime: node registration
// (a worker announces itself and its devices), health checks (the
// scheduler's liveness view of the cluster), and task dispatch (send a
// compiled runtime.module — the `ir` bytes are AotCompiler's output from
// Phase 4 — with its per-op placement already decided, and wait for the
// result). See scheduler_service.cpp for the implementation.

service Scheduler {
  rpc RegisterNode(NodeInfo) returns (NodeId);
  rpc HealthCheck(NodeId) returns (HealthStatus);
  rpc DispatchTask(TaskSpec) returns (TaskId);
  rpc WaitTask(TaskId) returns (TaskResult);
}

message NodeInfo {
  string hostname = 1;
  repeated string devices = 2;  // e.g. ["gpu:0", "gpu:1"]
}

message NodeId   { string id = 1; }
message TaskSpec { bytes ir = 1; map<string, string> placement = 2; }
message TaskId   { string id = 1; }
message TaskResult { bytes output = 1; string error = 2; }
message HealthStatus { bool healthy = 1; string message = 2; }
